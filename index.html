<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Move the Parts, Change the Meaning</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f6f6;
      color: #111;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    p {
      color: #555;
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }
    button {
      border: 1px solid #ccc;
      border-radius: 999px;
      padding: 10px 16px;
      background: white;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover {
      background: #eee;
    }
    .primary {
      background: #111;
      color: white;
      border-color: #111;
    }
    .primary:hover {
      background: #333;
    }
    .stage {
      background: white;
      border: 1px solid #ddd;
      border-radius: 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
      padding: 12px;
    }
    svg {
      width: 100%;
      height: 620px;
      display: block;
      user-select: none;
      touch-action: none;
      background: white;
      border-radius: 16px;
    }
    .draggable {
      cursor: grab;
    }
    .draggable:active {
      cursor: grabbing;
    }
    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #666;
    }
    .message-box {
      font-size: 18px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Move the Parts, Change the Meaning</h1>
    <p>
      A simple interactive demonstration of Design.
    </p>

    <div class="toolbar">
      <button onclick="resetElements()">Reset</button>
      <button class="primary" onclick="flipElement()">Flip element</button>
      <button onclick="rotateElement()">Rotate element</button>
    </div>

    <div class="stage">
      <svg id="svg" viewBox="0 0 900 520">
        <text x="40" y="54" font-size="24" font-weight="600">Drag these elements</text>
        <text x="530" y="54" font-size="24" font-weight="600">Create an effect</text>
        <line x1="470" y1="85" x2="470" y2="475" stroke="#e4e4e7" stroke-width="3" stroke-dasharray="10 10"></line>

        <g opacity="0.12" pointer-events="none">
          <circle cx="665" cy="235" r="78" fill="none" stroke="black" stroke-width="4"></circle>
        </g>

        <circle id="head" class="draggable" cx="205" cy="245" r="78" fill="white" stroke="black" stroke-width="4"></circle>
        <circle id="eye1" class="draggable" cx="85" cy="315" r="14" fill="white" stroke="black" stroke-width="4"></circle>
        <circle id="eye2" class="draggable" cx="315" cy="260" r="14" fill="white" stroke="black" stroke-width="4"></circle>

        <g id="element" class="draggable" transform="translate(140 235) rotate(0) scale(1 1)">
          <path d="M -52 -14 Q 0 36 52 -14" fill="none" stroke="black" stroke-width="4" stroke-linecap="round"></path>
        </g>

        <foreignObject x="520" y="400" width="330" height="90">
          <div xmlns="http://www.w3.org/1999/xhtml" style="background:#f6f6f6;border:1px solid #ddd;border-radius:16px;padding:14px;">
            <div id="message" class="message-box">Move the same simple elements to see how arrangement changes meaning.</div>
          </div>
        </foreignObject>
      </svg>
    </div>

    <p class="note">
      Dr. Ni Teaching note: design composition and how effect change when the same elements are arranged differently.
    </p>
  </div>

  <script>
    const svg = document.getElementById("svg");

    const elements = {
      head: document.getElementById("head"),
      eye1: document.getElementById("eye1"),
      eye2: document.getElementById("eye2"),
      element: document.getElementById("element")
    };

    const originalState = {
      head: { x: 205, y: 245, r: 78 },
      eye1: { x: 85, y: 315, r: 14 },
      eye2: { x: 315, y: 260, r: 14 },
      element: { x: 140, y: 235, scale: 1, flip: false, rot: 0 }
    };

    let state = JSON.parse(JSON.stringify(originalState));
    let active = null;

    function svgPoint(evt) {
      const pt = svg.createSVGPoint();
      pt.x = evt.clientX;
      pt.y = evt.clientY;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function render() {
      ["head", "eye1", "eye2"].forEach(id => {
        elements[id].setAttribute("cx", state[id].x);
        elements[id].setAttribute("cy", state[id].y);
      });

      const e = state.element;
      const flipScale = e.flip ? -e.scale : e.scale;
      elements.element.setAttribute(
        "transform",
        `translate(${e.x} ${e.y}) rotate(${e.rot}) scale(${e.scale} ${flipScale})`
      );
    }

    function startDrag(evt, id) {
      evt.preventDefault();
      const p = svgPoint(evt);
      active = {
        id,
        dx: p.x - state[id].x,
        dy: p.y - state[id].y
      };
    }

    function drag(evt) {
      if (!active) return;
      const p = svgPoint(evt);
      state[active.id].x = p.x - active.dx;
      state[active.id].y = p.y - active.dy;
      render();
    }

    function endDrag() {
      active = null;
    }

    Object.keys(elements).forEach(id => {
      elements[id].addEventListener("pointerdown", evt => startDrag(evt, id));
    });

    svg.addEventListener("pointermove", drag);
    svg.addEventListener("pointerup", endDrag);
    svg.addEventListener("pointerleave", endDrag);

    function resetElements() {
      state = JSON.parse(JSON.stringify(originalState));
      document.getElementById("message").textContent =
        "Move the same simple elements to see how arrangement changes meaning.";
      render();
    }

    function flipElement() {
      state.element.flip = !state.element.flip;
      document.getElementById("message").textContent =
        "A small change in orientation can create a very different feeling.";
      render();
    }

    function rotateElement() {
      state.element.rot += 15;
      render();
    }

    render();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agent Liam's Secret Vault</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  padding: 40px;

  background-image: linear-gradient(
      rgba(0, 0, 0, 0.55),
      rgba(0, 0, 0, 0.75)
    ),
    url("Vault.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

    .vault-box {
       background: rgba(31, 41, 55, 0.88);
  max-width: 500px;
  margin: auto;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
    }

    h1 {
      color: #facc15;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 80%;
      text-align: center;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 25px;
      font-size: 20px;
      line-height: 1.5;
    }

    .success {
      color: #86efac;
    }

    .error {
      color: #fca5a5;
    }
  </style>
</head>

<body>
  <div class="vault-box">
    <h1>🔐 Agent Liam's Secret Vault</h1>

    <p>Enter your mission passcode to unlock the hidden treasure location.</p>

    <input type="text" id="codeInput" placeholder="Enter passcode here">
    <br>
    <button onclick="checkCode()">Unlock Vault</button>

    <div id="result"></div>
  </div>

  <script>
    function checkCode() {
      const code = document.getElementById("codeInput").value.trim().toUpperCase();
      const result = document.getElementById("result");

      const vaults = {
        "103222AB": {
          title: "Week 2 Treasure Unlocked!",
          message: "The Second Lost Treasure is hidden in Liam's closet, on the top shelf."
        },
        "O58ABC": {
          title: "Week 3 Treasure Unlocked!",
          message: "The Third Lost Treasure is hidden behind the family bookshelf, on the middle shelf, behind photobooks."
        },
        "CAT10012B4": {
          title: "Final Treasure Vault Unlocked!",
          message: "The Final Lost Treasure is hidden inside Pantry, Top-SHelf."
        }
      };

      if (vaults[code]) {
        result.className = "success";
        result.innerHTML =
          "✅ <strong>Access Granted, Agent Liam!</strong><br><br>" +
          "<strong>" + vaults[code].title + "</strong><br>" +
          vaults[code].message +
          "<br><br>Great work! Don't forget to tell Dad what you found.";
      } else {
        result.className = "error";
        result.innerHTML =
          "❌ Access Denied.<br>" +
          "Check your code and try again, Agent Liam.";
      }
    }
  </script>
</body>
</html>
